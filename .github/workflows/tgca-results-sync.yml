name: Sync TGCA-baseline-resullts

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest site snapshot
        run: |
          mkdir -p TGCA-baseline-resullts/data
          curl -fsSL http://114.71.219.49:8123/index.html -o TGCA-baseline-resullts/index.html
          curl -fsSL http://114.71.219.49:8123/app.js -o TGCA-baseline-resullts/app.js
          curl -fsSL http://114.71.219.49:8123/styles.css -o TGCA-baseline-resullts/styles.css
          curl -fsSL http://114.71.219.49:8123/leaderboard_page.js -o TGCA-baseline-resullts/leaderboard_page.js
          curl -fsSL http://114.71.219.49:8123/leaderboard-covla.html -o TGCA-baseline-resullts/leaderboard-covla.html
          curl -fsSL http://114.71.219.49:8123/leaderboard-dashcam.html -o TGCA-baseline-resullts/leaderboard-dashcam.html
          curl -fsSL http://114.71.219.49:8123/data/results.json -o TGCA-baseline-resullts/data/results.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- TGCA-baseline-resullts; then
            echo "No TGCA-baseline-resullts changes detected."
            exit 0
          fi
          git add TGCA-baseline-resullts
          git commit -m "Sync TGCA-baseline-resullts"
          git push
