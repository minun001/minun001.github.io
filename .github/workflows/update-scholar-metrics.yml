name: Update Google Scholar Data

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scholar-metrics-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Refresh Google Scholar data
        run: python tools/update_scholar_metrics.py

      - name: Commit and push updated snapshot
        run: |
          if git diff --quiet; then
            echo "No Scholar changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/google-scholar-metrics.json _data/google-scholar-publications.json
          git commit -m "Update Google Scholar data"
          git push
