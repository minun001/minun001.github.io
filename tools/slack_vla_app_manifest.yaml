display_information:
  name: VLA
  description: Completion notifier for VLA work owned by Hyunsik Min.
  background_color: "#0F172A"

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: VLA
    always_online: false

oauth_config:
